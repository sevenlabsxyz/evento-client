name: OpenRouter Reviewer

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  review:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@alfred')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@alfred')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@alfred')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@alfred') || contains(github.event.issue.title, '@alfred')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run OpenRouter Reviewer
        uses: ./.github/actions/openrouter-reviewer
        with:
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          bot_name: '@alfred'
          model: 'z-ai/glm-5'
