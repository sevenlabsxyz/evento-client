name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[WIP]') &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true

          direct_prompt: |
            Review this PR. Read the full diff and all changed files before commenting.

            Focus ONLY on things that matter:
            - Bugs, logic errors, or regressions (verify claims by reading the actual code paths)
            - Security issues (injection, auth bypass, data exposure)
            - Breaking changes to API contracts or data shapes
            - Race conditions or state management issues

            Do NOT comment on:
            - Style, formatting, or naming preferences
            - Missing tests unless a bug-prone code path is untested
            - Suggestions for "future improvements" or refactoring beyond the PR scope
            - Performance unless there is a measurable, concrete concern

            Output format rules:
            - Be concise. No tables, no ratings, no scores, no emoji.
            - If there are no real issues, say "LGTM" and nothing else.
            - For each issue found: state the file:line, what's wrong, and why it matters in 1-3 sentences.
            - If you're unsure about something, say so. Do not speculate or contradict yourself.
            - Do not repeat the same point in different words.
            - Never use filler like "Great work!" or "Outstanding implementation!"
