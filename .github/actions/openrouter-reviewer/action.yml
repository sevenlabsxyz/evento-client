name: 'OpenRouter Reviewer'
author: 'evento'
description: 'Interactive AI code reviewer using OpenRouter'

inputs:
  openrouter_api_key:
    description: 'OpenRouter API key'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: true
  bot_name:
    description: 'Bot name to respond to (e.g., @alfred)'
    default: '@alfred'
  model:
    description: 'OpenRouter model ID'
    default: 'z-ai/glm-5'
  auto_review:
    description: 'Run review automatically on PR without requiring @mention'
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'message-circle'
  color: 'purple'
